<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Copilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .app {
      width: 100%;
      max-width: 720px;
      background: #1e293b;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
    }
    .header {
      padding: 20px 24px;
      background: #334155;
      border-bottom: 1px solid #475569;
    }
    .header h1 { font-size: 1.25rem; font-weight: 600; }
    .header p { font-size: .85rem; color: #94a3b8; margin-top: 4px; }
    .login-panel, .chat-panel { flex: 1; display: flex; flex-direction: column; }
    .login-panel { padding: 32px 24px; justify-content: center; }
    .login-panel label { display: block; font-size: .85rem; color: #94a3b8; margin-bottom: 6px; }
    .login-panel input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    .login-panel button, .chat-input button {
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
    }
    .login-panel button:hover, .chat-input button:hover { background: #2563eb; }
    .hint { font-size: .8rem; color: #64748b; margin-top: 16px; line-height: 1.5; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: .95rem;
      white-space: pre-wrap;
    }
    .msg.user { align-self: flex-end; background: #3b82f6; color: white; }
    .msg.bot { align-self: flex-start; background: #334155; border: 1px solid #475569; }
    .msg.error { align-self: center; background: #7f1d1d; color: #fecaca; font-size: .85rem; }
    .chat-input {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid #475569;
      background: #1e293b;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    .logout {
      float: right;
      font-size: .8rem;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
    .hidden { display: none !important; }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 24px 0;
    }
    .quick-actions button {
      padding: 6px 10px;
      border: 1px solid #475569;
      border-radius: 999px;
      background: #334155;
      color: #e2e8f0;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .demo-picks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .demo-picks button {
      padding: 6px 10px;
      border: 1px solid #475569;
      border-radius: 8px;
      background: #334155;
      color: #cbd5e1;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .demo-picks button:hover { background: #475569; }
    .nav-links { margin-top: 12px; font-size: 0.85rem; }
    .nav-links a { color: #60a5fa; margin-right: 12px; }
    .quick-actions button:hover { background: #475569; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <button class="logout hidden" id="logoutBtn" onclick="logout()">Logout</button>
      <h1>Office Copilot</h1>
      <p id="subtitle">AI workplace assistant — login to chat</p>
    </div>

    <div class="login-panel" id="loginPanel">
      <label>Email</label>
      <input type="email" id="email" placeholder="intern@office.com" value="intern@office.com" />
      <label>Password</label>
      <input type="password" id="password" placeholder="Password" value="intern123" />
      <p class="hint" style="margin-top:0;margin-bottom:8px">Quick pick a demo account:</p>
      <div class="demo-picks">
        <button type="button" onclick="pickDemo('intern@office.com','intern123')">Intern</button>
        <button type="button" onclick="pickDemo('manager@office.com','mgr123')">Manager</button>
        <button type="button" onclick="pickDemo('ea@office.com','ea123')">EA</button>
        <button type="button" onclick="pickDemo('admin@office.com','admin123')">Admin</button>
        <button type="button" onclick="pickDemo('director@office.com','welcome123')">Director</button>
      </div>
      <button onclick="login()">Login &amp; Chat</button>
      <p class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Open full dashboard</a>
      </p>
      <p class="hint">
        Or type any demo email/password from seed data (most use welcome123).
      </p>
    </div>

    <div class="chat-panel hidden" id="chatPanel">
      <div class="quick-actions" id="quickActions">
        <button onclick="sendQuick('show my tasks')">My tasks</button>
        <button class="mgr-only hidden" onclick="sendQuick('show team status')">Team status</button>
        <button onclick="sendQuick('list rooms')">List rooms</button>
        <button onclick="sendQuick('book room A for 3-7pm')">Book room</button>
        <button onclick="sendQuick('is Director Kumar available tomorrow')">Director free?</button>
        <button class="mgr-only hidden" onclick="sendQuick('assign task Prepare test data to You (Intern) due tomorrow')">Assign task</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask anything... e.g. Book Conference Room A tomorrow 10-11am"
          onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // Must open via http://127.0.0.1:8000/app — not by double-clicking the HTML file
    const API_BASE = window.location.protocol === "file:"
      ? "http://127.0.0.1:8000"
      : window.location.origin;

    if (window.location.protocol === "file:") {
      alert("Open the chat at http://127.0.0.1:8000/app (start uvicorn first).");
    }

    let token = localStorage.getItem("copilot_token");
    let userName = localStorage.getItem("copilot_user");
    let userObj = JSON.parse(localStorage.getItem("copilot_user_obj") || "null");

    if (token && userName) showChat();

    function pickDemo(email, password) {
      document.getElementById("email").value = email;
      document.getElementById("password").value = password;
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const body = new URLSearchParams();
      body.append("username", email);
      body.append("password", password);

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || "Login failed");
          return;
        }
        token = data.access_token;
        userName = data.user.name;
        userObj = data.user;
        localStorage.setItem("copilot_token", token);
        localStorage.setItem("copilot_user", userName);
        localStorage.setItem("copilot_user_obj", JSON.stringify(data.user));
        showChat();
        addMessage("bot", `Hi ${userName}! Try a quick button above or ask anything. Open the full dashboard anytime from the header link.`);
      } catch (e) {
        alert(`Cannot reach server at ${API_BASE}. Start uvicorn, then open http://127.0.0.1:8000/app`);
      }
    }

    function logout() {
      token = null;
      userName = null;
      userObj = null;
      localStorage.removeItem("copilot_token");
      localStorage.removeItem("copilot_user");
      localStorage.removeItem("copilot_user_obj");
      document.getElementById("loginPanel").classList.remove("hidden");
      document.getElementById("chatPanel").classList.add("hidden");
      document.getElementById("logoutBtn").classList.add("hidden");
      document.getElementById("messages").innerHTML = "";
      document.getElementById("subtitle").textContent = "AI workplace assistant — login to chat";
    }

    function showChat() {
      document.getElementById("loginPanel").classList.add("hidden");
      document.getElementById("chatPanel").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      const role = userObj?.role || "";
      const isMgr = role === "manager" || role === "admin";
      document.querySelectorAll(".mgr-only").forEach(el => {
        el.classList.toggle("hidden", !isMgr);
      });
      document.getElementById("subtitle").innerHTML =
        `Logged in as ${userName} · <a href="/dashboard" style="color:#93c5fd">Dashboard</a>`;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    function sendQuick(text) {
      document.getElementById("chatInput").value = text;
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;
      if (!token) {
        addMessage("error", "Not logged in. Please login again.");
        return;
      }
      input.value = "";
      addMessage("user", text);
      addMessage("bot", "Thinking...");

      const thinking = document.getElementById("messages").lastChild;

      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({ message: text }),
        });

        let data;
        const raw = await res.text();
        try {
          data = JSON.parse(raw);
        } catch {
          thinking.remove();
          addMessage("error", `Server error (${res.status}): ${raw || "empty response"}`);
          return;
        }

        thinking.remove();

        if (!res.ok) {
          const msg = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
          addMessage("error", msg || "Request failed");
          if (res.status === 401) logout();
          return;
        }
        addMessage("bot", data.reply || "No response.");
      } catch (e) {
        thinking.remove();
        addMessage("error", `Cannot reach server at ${API_BASE}. Error: ${e.message}`);
      }
    }
  </script>
</body>
</html>
